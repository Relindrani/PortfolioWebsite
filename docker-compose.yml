services:
  postgres:
    image: postgres:15
    container_name: helios-postgres
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: helios
      POSTGRES_DB: helios
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios -d helios"]
      interval: 10s
      timeout: 5s
      retries: 5

  helios-api:
    build:
      context: ./apps/Helios.Api
      dockerfile: Dockerfile
    container_name: helios-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Helios: Host=postgres;Port=5432;Database=helios;Username=helios;Password=helios
    ports:
      - "5091:8080"
    depends_on:
      postgres:
        condition: service_healthy

  helios-ui:
    build:
      context: ./apps/helios-ui
      dockerfile: Dockerfile
      args:
        HELIOS_API_BASE_URL: http://localhost:5091
    container_name: helios-ui
    ports:
      - "4321:80"
    depends_on:
      - helios-api

  portfolio-site:
    build:
      context: ./apps/portfolio-astro
      dockerfile: Dockerfile
    container_name: portfolio-site
    ports:
      - "4322:80"

volumes:
  postgres-data:
